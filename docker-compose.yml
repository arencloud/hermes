version: "3.8"

services:
  db:
    image: quay.io/sclorg/postgresql-15-c9s
    container_name: hermes-db
    environment:
      - POSTGRESQL_DATABASE=hermes
      - POSTGRESQL_USER=postgres
      - POSTGRESQL_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hermes -h 127.0.0.1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
  hermes:
    container_name: hermes
    build:
      context: .
      dockerfile: Containerfile
      args:
        GOPROXY: ${GOPROXY:-direct}
        GOSUMDB: ${GOSUMDB:-off}
    environment:
      - PORT=8080
      - HERMES_SESSION_SECRET=${HERMES_SESSION_SECRET:-dev-secret-change-me}
      - DATABASE_URL=postgres://postgres:postgres@db:5432/hermes?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  dbdata:
