{{template "base_top" .}}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3"><i class="bi bi-person-plus"></i> Signup</h1>
        {{if .Error}}
        <div class="alert alert-danger" role="alert">{{.Error}}</div>
        {{end}}
        <form method="post" action="/signup" novalidate>
          <div class="mb-3">
            <label class="form-label">Organization name</label>
            <input class="form-control" type="text" name="organizationName" placeholder="Acme Inc" required>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Display name</label>
              <input class="form-control" type="text" name="displayName" placeholder="Jane Doe">
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" name="email" placeholder="jane@example.com" required>
            </div>
          </div>
          <div class="mb-3 mt-3">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" required>
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-success" type="submit"><i class="bi bi-check2-circle"></i> Create account</button>
          </div>
        </form>
        <div class="text-center mt-3">
          <small>Already have an account? <a href="/login">Sign in</a></small>
        </div>
      </div>
    </div>
  </div>
</div>
{{template "base_bottom" .}}
