{{template "base_top" .}}
<div class="row">
  <div class="col-12">
    <div class="d-flex align-items-center mb-3">
      <i class="bi bi-folder2-open display-6 me-2"></i>
      <h1 class="h3 mb-0">Browse Objects</h1>
    </div>
    <div id="alert" class="alert d-none" role="alert"></div>
    <div class="card mb-3">
      <div class="card-header d-flex justify-content-between align-items-center">
        <div>
          <i class="bi bi-compass"></i> Path: <code id="pathDisplay">/</code>
        </div>
        <div>
          <button id="upBtn" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-up"></i> Up</button>
        </div>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th style="width: 40px;"></th>
                <th>Name</th>
                <th style="width: 280px;">Actions</th>
              </tr>
            </thead>
            <tbody id="objectsBody">
              <tr><td colspan="3" class="text-muted text-center">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    {{if .CanPush}}
    <div class="card">
      <div class="card-header"><i class="bi bi-upload"></i> Upload</div>
      <div class="card-body">
        <form id="uploadForm" class="row g-2">
          <div class="col-md-6">
            <input type="file" class="form-control" id="fileInput" name="file" required>
          </div>
          <div class="col-md-4">
            <input type="text" class="form-control" id="keyInput" name="key" placeholder="Optional key (defaults to filename)">
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-cloud-upload"></i> Upload</button>
          </div>
        </form>
      </div>
    </div>
    {{end}}
  </div>
</div>

<span id="meta" data-org-id="{{.OrgID}}" data-storage-id="{{.StorageID}}" data-can-push="{{if .CanPush}}1{{else}}0{{end}}" class="d-none"></span>
<script>
(function(){
  const meta = document.getElementById('meta');
  const CAN_PUSH = meta.dataset.canPush === '1';
  const ORG_ID = meta.dataset.orgId;
  const STORAGE_ID = meta.dataset.storageId;
  const alertBox = document.getElementById('alert');
  const pathDisplay = document.getElementById('pathDisplay');
  const tbody = document.getElementById('objectsBody');
  const upBtn = document.getElementById('upBtn');

  function showAlert(type, msg){ alertBox.className = 'alert alert-'+type; alertBox.textContent = msg; }
  function joinPath(a,b){ if(!a) return b||''; if(!b) return a; if(a.endsWith('/')) return a+b; return a+'/'+b; }
  function dirname(p){ if(!p) return ''; const parts = p.split('/').filter(Boolean); parts.pop(); return parts.length? parts.join('/')+'/':''; }
  function basename(p){ if(!p) return ''; const t=p.endsWith('/')?p.slice(0,-1):p; const i=t.lastIndexOf('/'); return i>=0?t.slice(i+1):t; }

  let prefix = new URLSearchParams(location.search).get('prefix') || '';

  async function loadObjects(){
    pathDisplay.textContent = '/'+(prefix||'');
    const url = `/api/v1/organizations/${ORG_ID}/storages/${STORAGE_ID}/objects` + (prefix?`?prefix=${encodeURIComponent(prefix)}`:'');
    tbody.innerHTML = '<tr><td colspan="3" class="text-muted text-center">Loading...</td></tr>';
    try{
      const res = await fetch(url);
      if(!res.ok){ throw new Error('Failed to load objects'); }
      const list = await res.json();
      // Build pseudo-folders from keys
      const dirs = new Set();
      const files = [];
      (list||[]).forEach(k=>{
        if(prefix && !k.startsWith(prefix)) return;
        const rest = prefix? k.slice(prefix.length): k;
        const seg = rest.split('/');
        if(seg.length>1){ dirs.add(seg[0]); } else if(rest){ files.push(rest); }
      });
      const rows = [];
      // folders
      Array.from(dirs).sort().forEach(d=>{
        const next = joinPath(prefix, d) + '/';
        rows.push(`<tr class="table-row">
          <td><i class="bi bi-folder-fill text-warning"></i></td>
          <td><a href="?prefix=${encodeURIComponent(next)}">${d}/</a></td>
          <td>
            ${CAN_PUSH ? `<button class="btn btn-sm btn-outline-danger" data-del-prefix="${next}"><i class="bi bi-trash"></i> Delete folder</button>` : ''}
          </td>
        </tr>`);
      });
      // files
      files.sort().forEach(f=>{
        const key = joinPath(prefix, f);
        rows.push(`<tr>
          <td><i class="bi bi-file-earmark"></i></td>
          <td>${f}</td>
          <td>
            <a class="btn btn-sm btn-outline-primary" href="/api/v1/organizations/${ORG_ID}/storages/${STORAGE_ID}/objects/${encodeURIComponent(key)}"><i class="bi bi-download"></i> Download</a>
            ${CAN_PUSH ? `<button class=\"btn btn-sm btn-outline-danger ms-1\" data-del=\"${key}\"><i class=\"bi bi-trash\"></i> Delete</button>` : ''}
          </td>
        </tr>`);
      });
      if(rows.length===0){ tbody.innerHTML = '<tr><td colspan="3" class="text-muted text-center">No objects</td></tr>'; } else { tbody.innerHTML = rows.join(''); }
    }catch(e){ tbody.innerHTML = '<tr><td colspan="3" class="text-danger text-center">'+e.message+'</td></tr>'; }
  }

  // Handle deletes (file and pseudo-folder)
  tbody.addEventListener('click', async (e)=>{
    const btnFile = e.target.closest('button[data-del]');
    const btnFolder = e.target.closest('button[data-del-prefix]');
    if(btnFile){
      const key = btnFile.getAttribute('data-del');
      if(!confirm('Delete '+key+' ?')) return;
      const res = await fetch(`/api/v1/organizations/${ORG_ID}/storages/${STORAGE_ID}/objects/${encodeURIComponent(key)}`, { method:'DELETE' });
      if(res.ok){ showAlert('success','Deleted '+key); loadObjects(); } else { showAlert('danger','Delete failed'); }
    }
    if(btnFolder){
      const pref = btnFolder.getAttribute('data-del-prefix');
      if(!confirm('Delete all objects under '+pref+' ?')) return;
      // naive: list and delete each
      const res = await fetch(`/api/v1/organizations/${ORG_ID}/storages/${STORAGE_ID}/objects?prefix=${encodeURIComponent(pref)}`);
      if(!res.ok){ showAlert('danger','Failed to list folder'); return; }
      const list = await res.json();
      const toDel = (list||[]).filter(k=>k.startsWith(pref));
      for(const k of toDel){
        await fetch(`/api/v1/organizations/${ORG_ID}/storages/${STORAGE_ID}/objects/${encodeURIComponent(k)}`, { method:'DELETE' });
      }
      showAlert('success','Folder deleted');
      loadObjects();
    }
  });

  // Up navigation
  upBtn.addEventListener('click', (e)=>{
    e.preventDefault();
    prefix = dirname(prefix);
    const q = prefix? ('?prefix='+encodeURIComponent(prefix)) : '';
    history.replaceState(null, '', q);
    loadObjects();
  });

  // Upload
  document.getElementById('uploadForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const file = document.getElementById('fileInput').files[0];
    if(!file){ showAlert('warning','Select a file'); return; }
    const keyOverride = document.getElementById('keyInput').value.trim();
    const form = new FormData();
    form.append('file', file);
    let key = keyOverride || file.name;
    key = joinPath(prefix, key);
    form.append('key', key);
    const r = await fetch(`/api/v1/organizations/${ORG_ID}/storages/${STORAGE_ID}/objects`, { method:'POST', body: form });
    if(r.ok){ showAlert('success','Uploaded'); (document.getElementById('uploadForm')).reset(); loadObjects(); } else { showAlert('danger','Upload failed'); }
  });

  loadObjects();
})();
</script>
{{template "base_bottom" .}}
