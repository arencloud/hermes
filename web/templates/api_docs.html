{{template "base_top" .}}
<div class="row">
  <div class="col-12">
    <div class="d-flex align-items-center mb-3">
      <i class="bi bi-journal-code display-6 me-2"></i>
      <h1 class="h3 mb-0">API Documentation</h1>
    </div>
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-code-slash"></i> OpenAPI · {{appName}} v{{appVersion}}</span>
        <a class="btn btn-sm btn-outline-secondary" href="/swagger" target="_blank"><i class="bi bi-box-arrow-up-right"></i> Open standalone</a>
      </div>
      <div class="card-body">
        <!-- Swagger UI container styled to fit within our layout -->
        <div id="swagger-ui"></div>
      </div>
    </div>
  </div>
</div>

<!-- Load Swagger UI assets -->
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
(function(){
  const ui = SwaggerUIBundle({
    url: '/openapi.json',
    dom_id: '#swagger-ui',
    presets: [SwaggerUIBundle.presets.apis],
    layout: 'BaseLayout'
  });
  window.ui = ui;
})();
</script>
{{template "base_bottom" .}}
