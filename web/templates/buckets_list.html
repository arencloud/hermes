{{template "base_top" .}}
<div class="row">
  <div class="col-12">
    <div class="d-flex align-items-center mb-3">
      <i class="bi bi-list-ul display-6 me-2"></i>
      <h1 class="h3 mb-0">Buckets List</h1>
    </div>
    <div id="alert" class="alert d-none" role="alert"></div>
    <span id="orgMeta" data-org-id="{{.OrgID}}" class="d-none"></span>
    <div class="table-responsive">
      <table class="table table-striped align-middle">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Bucket</th>
            <th scope="col">Region</th>
            <th scope="col">Endpoint</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody id="storagesBody">
        </tbody>
      </table>
    </div>
  </div>
</div>
<script>
(function(){
  const ORG_ID = (document.getElementById('orgMeta').dataset.orgId || null);
  const alertBox = document.getElementById('alert');
  function showAlert(type, msg){
    alertBox.className = 'alert alert-' + type;
    alertBox.textContent = msg;
  }
  async function loadStorages(){
    try{
      const res = await fetch(`/api/v1/organizations/${ORG_ID}/storages`);
      if(!res.ok){ throw new Error('Failed to load storages'); }
      const list = await res.json();
      const tbody = document.getElementById('storagesBody');
      tbody.innerHTML = '';
      if(!Array.isArray(list) || list.length === 0){
        const tr = document.createElement('tr');
        const td = document.createElement('td'); td.colSpan = 6; td.className = 'text-center text-muted'; td.textContent = 'No buckets configured yet.';
        tr.appendChild(td); tbody.appendChild(tr); return;
      }
      list.forEach((s, idx)=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <th scope="row">${idx+1}</th>
          <td>${s.name || ''}</td>
          <td><code>${s.bucket || ''}</code></td>
          <td>${s.region || ''}</td>
          <td><small>${s.endpoint || ''}</small></td>
          <td>
            <a class="btn btn-sm btn-outline-secondary" href="/buckets/browse/${s.id}"><i class="bi bi-folder2-open"></i> Browse</a>
            {{if .CanPush}}<button class="btn btn-sm btn-outline-danger ms-1" data-id="${s.id}"><i class="bi bi-trash"></i> Delete</button>{{end}}
          </td>`;
        tbody.appendChild(tr);
      });
      tbody.addEventListener('click', async (e)=>{
        const btn = e.target.closest('button[data-id]');
        if(!btn) return;
        const id = btn.getAttribute('data-id');
        if(!confirm('Delete this storage configuration?')) return;
        const resp = await fetch(`/api/v1/organizations/${ORG_ID}/storages/${id}`, { method: 'DELETE' });
        if(resp.ok){ showAlert('success','Deleted successfully'); loadStorages(); } else { showAlert('danger','Delete failed'); }
      }, { once: true });
    }catch(err){
      showAlert('danger', err.message);
    }
  }
  if(ORG_ID){ loadStorages(); } else { showAlert('warning','Organization not set'); }
})();
</script>
{{template "base_bottom" .}}
