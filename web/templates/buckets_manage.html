{{template "base_top" .}}
<div class="row">
  <div class="col-lg-6">
    <div class="d-flex align-items-center mb-3">
      <i class="bi bi-hdd-stack display-6 me-2"></i>
      <h1 class="h3 mb-0">Buckets Management</h1>
    </div>
    <div id="alert" class="alert d-none" role="alert"></div>
    <div class="card mb-3">
      <div class="card-header"><i class="bi bi-plus-circle"></i> New S3 Storage</div>
      <div class="card-body">
        <form id="createForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Name</label>
            <input name="name" class="form-control" type="text" placeholder="My S3" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Bucket</label>
            <input name="bucket" class="form-control" type="text" placeholder="my-bucket" required>
          </div>
          <div class="col-md-8">
            <label class="form-label">Endpoint</label>
            <input name="endpoint" class="form-control" type="text" placeholder="https://s3.amazonaws.com" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Region</label>
            <input name="region" class="form-control" type="text" placeholder="us-east-1">
          </div>
          <div class="col-md-6">
            <label class="form-label">Access Key</label>
            <input name="accessKey" class="form-control" type="text" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Secret Key</label>
            <input name="secretKey" class="form-control" type="password" required>
          </div>
          <div class="col-12 form-check">
            <input class="form-check-input" type="checkbox" id="useSSL" name="useSSL" checked>
            <label class="form-check-label" for="useSSL">Use SSL</label>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-success"><i class="bi bi-plus-circle"></i> Create</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="col-lg-6">
    <div class="card mb-3">
      <div class="card-header"><i class="bi bi-list-ul"></i> Existing storages</div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-sm table-striped align-middle">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Bucket</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="storagesBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<span id="orgMeta" data-org-id="{{.OrgID}}" data-role="{{.Role}}" data-username="{{.Username}}" class="d-none"></span>

<!-- Edit Storage Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Edit S3 Storage</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="editAlert" class="alert d-none" role="alert"></div>
        <form id="editForm" class="row g-3">
          <input type="hidden" id="e_id">
          <div class="col-md-6">
            <label class="form-label">Name</label>
            <input id="e_name" class="form-control" type="text" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Bucket</label>
            <input id="e_bucket" class="form-control" type="text" required>
          </div>
          <div class="col-md-8">
            <label class="form-label">Endpoint</label>
            <input id="e_endpoint" class="form-control" type="text" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Region</label>
            <input id="e_region" class="form-control" type="text">
          </div>
          <div class="col-md-6">
            <label class="form-label">Access Key</label>
            <input id="e_accessKey" class="form-control" type="text">
          </div>
          <div class="col-md-6">
            <label class="form-label">Secret Key <small class="text-muted">(leave blank to keep unchanged)</small></label>
            <input id="e_secretKey" class="form-control" type="password" placeholder="••••••">
          </div>
          <div class="col-12 form-check">
            <input class="form-check-input" type="checkbox" id="e_useSSL">
            <label class="form-check-label" for="e_useSSL">Use SSL</label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="saveEdit" class="btn btn-primary"><i class="bi bi-save"></i> Save changes</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const ORG_ID = (document.getElementById('orgMeta').dataset.orgId || null);
  const alertBox = document.getElementById('alert');
  function showAlert(type, msg){ alertBox.className='alert alert-'+type; alertBox.textContent=msg; alertBox.classList.remove('d-none'); }
  function showEditAlert(type, msg){ const a=document.getElementById('editAlert'); a.className='alert alert-'+type; a.textContent=msg; a.classList.remove('d-none'); }
  function hideEditAlert(){ const a=document.getElementById('editAlert'); a.className='alert d-none'; a.textContent=''; }
  function formToJSON(form){
    const o = {}; new FormData(form).forEach((v,k)=>{ o[k]=v }); o.useSSL = document.getElementById('useSSL').checked; return o;
  }

  const meta = document.getElementById('orgMeta');
  const ROLE = meta.dataset.role || '';
  const USERNAME = meta.dataset.username || '';

  let editModal, currentEditId = null;
  function ensureEditModal(){ if(!editModal){ editModal = new bootstrap.Modal(document.getElementById('editModal')); } return editModal; }

  async function loadStorages(){
    const res = await fetch(`/api/v1/organizations/${ORG_ID}/storages`);
    const tbody = document.getElementById('storagesBody'); tbody.innerHTML='';
    if(!res.ok){ showAlert('danger','Failed to load storages'); return; }
    const list = await res.json();
    if(!Array.isArray(list) || list.length===0){ tbody.innerHTML = '<tr><td colspan="4" class="text-muted text-center">No storages</td></tr>'; return; }
    list.forEach((s, i)=>{
      const tr = document.createElement('tr');
      const canManage = (ROLE === 'admin') || (s.createdByEmail && s.createdByEmail === USERNAME);
      tr.innerHTML = `<td>${i+1}</td><td>${s.name||''}</td><td><code>${s.bucket||''}</code></td>
        <td>
          <a class="btn btn-sm btn-outline-secondary" href="/buckets/browse/${s.id}"><i class="bi bi-folder2-open"></i></a>
          ${canManage ? `<button class="btn btn-sm btn-outline-primary ms-1" data-edit-id="${s.id}"><i class="bi bi-pencil-square"></i></button>` : ''}
          ${canManage ? `<button class="btn btn-sm btn-outline-danger ms-1" data-id="${s.id}"><i class="bi bi-trash"></i></button>` : ''}
        </td>`;
      tbody.appendChild(tr);
    });

    tbody.onclick = async (e)=>{
      const delBtn = e.target.closest('button[data-id]');
      const editBtn = e.target.closest('button[data-edit-id]');
      if(delBtn){
        const id = delBtn.getAttribute('data-id');
        if(!confirm('Delete this storage?')) return;
        const r = await fetch(`/api/v1/organizations/${ORG_ID}/storages/${id}`, { method:'DELETE' });
        if(r.ok){ showAlert('success','Deleted'); loadStorages(); } else { const t=await r.text(); showAlert('danger','Delete failed: '+t); }
        return;
      }
      if(editBtn){
        const id = editBtn.getAttribute('data-edit-id');
        currentEditId = id;
        hideEditAlert();
        // fetch storage details
        const r = await fetch(`/api/v1/organizations/${ORG_ID}/storages/${id}`);
        if(!r.ok){ showAlert('danger','Failed to load storage details'); return; }
        const s = await r.json();
        document.getElementById('e_id').value = s.id;
        document.getElementById('e_name').value = s.name||'';
        document.getElementById('e_bucket').value = s.bucket||'';
        document.getElementById('e_endpoint').value = s.endpoint||'';
        document.getElementById('e_region').value = s.region||'';
        document.getElementById('e_accessKey').value = s.accessKey||'';
        document.getElementById('e_secretKey').value = '';
        document.getElementById('e_useSSL').checked = !!s.useSSL;
        ensureEditModal().show();
      }
    };
  }

  document.getElementById('createForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const body = formToJSON(e.target);
    const res = await fetch(`/api/v1/organizations/${ORG_ID}/storages`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if(res.ok){ showAlert('success','Created'); e.target.reset(); document.getElementById('useSSL').checked=true; loadStorages(); } else { const t=await res.text(); showAlert('danger','Create failed: '+t); }
  });

  document.getElementById('saveEdit').addEventListener('click', async ()=>{
    if(!currentEditId) return;
    const payload = {
      name: document.getElementById('e_name').value,
      bucket: document.getElementById('e_bucket').value,
      endpoint: document.getElementById('e_endpoint').value,
      region: document.getElementById('e_region').value,
      accessKey: document.getElementById('e_accessKey').value,
      useSSL: document.getElementById('e_useSSL').checked,
    };
    const sec = document.getElementById('e_secretKey').value;
    if(sec){ payload.secretKey = sec; }
    hideEditAlert();
    const r = await fetch(`/api/v1/organizations/${ORG_ID}/storages/${currentEditId}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    if(r.ok){
      ensureEditModal().hide();
      showAlert('success','Updated');
      loadStorages();
    } else {
      const t = await r.text();
      showEditAlert('danger','Update failed: '+t);
    }
  });

  if(ORG_ID){ loadStorages(); }
})();
</script>
{{template "base_bottom" .}}
