{{template "base_top" .}}
<div class="row">
  <div class="col-lg-8">
    <div class="d-flex align-items-center mb-3">
      <i class="bi bi-building display-6 me-2"></i>
      <h1 class="h3 mb-0">Organization Settings</h1>
    </div>
    {{if .Error}}
    <div class="alert alert-danger">{{.Error}}</div>
    {{end}}
    {{if .Success}}
    <div class="alert alert-success">Settings saved.</div>
    {{end}}
    <form method="post" action="/admin/org">
      <div class="card mb-3">
        <div class="card-header">General</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Organization ID</label>
            <input type="text" class="form-control" value="{{.Org.ID}}" disabled>
          </div>
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" name="name" class="form-control" value="{{.Org.Name}}" required>
          </div>
          <div class="mb-3">
            <label for="slug" class="form-label">Slug</label>
            <input type="text" id="slug" name="slug" class="form-control" value="{{.Org.Slug}}" placeholder="auto-generated if empty">
          </div>
          <div class="mb-3">
            <label for="domain" class="form-label">Domain</label>
            <input type="text" id="domain" name="domain" class="form-control" value="{{.Org.Domain}}" placeholder="example.com">
          </div>
          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" name="description" rows="3" class="form-control">{{.Org.Description}}</textarea>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="isActive" name="isActive" {{if .Org.IsActive}}checked{{end}}>
            <label class="form-check-label" for="isActive">Active</label>
          </div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <a href="/admin" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back</a>
        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Changes</button>
      </div>
    </form>
  </div>
</div>
{{template "base_bottom" .}}
